openapi: 3.0.0
info:
  title: Sistema de Gestión de Solicitudes Académicas
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Servidor local de desarrollo
security:
  - BearerAuth: []

paths:

  /solicitudes:
    post:
      summary: Crear solicitud
      operationId: createSolicitud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrearSolicitudRequest'
      responses:
        '201':
          description: Solicitud creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'
        '400': { $ref: '#/components/responses/BadRequest' }

    get:
      summary: Listar solicitudes
      operationId: findSolicitudes
      parameters:
        - { name: estado, in: query, schema: { $ref: '#/components/schemas/EstadoSolicitud' } }
        - { name: tipoSolicitudId, in: query, schema: { type: string, format: uuid } }
        - { name: prioridad, in: query, schema: { $ref: '#/components/schemas/NivelPrioridad' } }
        - { name: responsableId, in: query, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Lista paginada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginaSolicitudes'

  /solicitudes/{id}:
    get:
      summary: Obtener solicitud por ID
      operationId: getSolicitudById
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Solicitud encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Solicitud'
        '404': { $ref: '#/components/responses/NotFound' }

  /solicitudes/{id}/clasificacion:
    put:
      summary: Clasificar solicitud
      operationId: classifySolicitud
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClasificacionRequest'
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /solicitudes/{id}/estado:
    patch:
      summary: Cambiar estado
      operationId: changeEstadoSolicitud
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CambioEstadoRequest'
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /solicitudes/{id}/asignacion:
    post:
      summary: Asignar responsable
      operationId: assignResponsable
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AsignacionRequest'
      responses:
        '201':
          description: Asignación creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asignacion'

  /solicitudes/{id}/historial:
    get:
      summary: Ver historial
      operationId: getHistorial
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Historial
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistorialSolicitud'

  /solicitudes/{id}/cierre:
    post:
      summary: Cerrar solicitud
      operationId: closeSolicitud
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CierreRequest'
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /usuarios:
    get:
      summary: Listar usuarios
      operationId: findUsuarios
      responses:
        '200':
          description: Lista usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'

  /tipos-solicitud:
    get:
      summary: Listar tipos
      operationId: findTiposSolicitud
      responses:
        '200':
          description: Lista tipos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TipoSolicitud'

  /prioridades:
    get:
      summary: Listar prioridades
      operationId: findPrioridades
      responses:
        '200':
          description: Lista prioridades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Prioridad'

  /ia/sugerencia-clasificacion:
    post:
      summary: Sugerencia IA
      operationId: suggestClasificacionIA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SugerenciaIARequest'
      responses:
        '200':
          description: Sugerencia generada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SugerenciaIAResponse'

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    Success:
      description: Operación exitosa
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    BadRequest:
      description: Datos inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    Solicitud:
      type: object
      properties:
        id: { type: string, format: uuid }
        descripcion: { type: string }
        fechaRegistro: { type: string, format: date-time }
        estado: { $ref: '#/components/schemas/EstadoSolicitud' }
        canalOrigen: { $ref: '#/components/schemas/CanalOrigen' }
        justificacionPrioridad: { type: string }
        tipoSolicitud: { $ref: '#/components/schemas/TipoSolicitud' }
        prioridad: { $ref: '#/components/schemas/Prioridad' }
        solicitante: { $ref: '#/components/schemas/Usuario' }
        asignacion: { $ref: '#/components/schemas/Asignacion' }

    Usuario:
      type: object
      properties:
        id: { type: string, format: uuid }
        nombre: { type: string }
        email: { type: string }
        rol: { $ref: '#/components/schemas/Rol' }
        activo: { type: boolean }

    TipoSolicitud:
      type: object
      properties:
        id: { type: string, format: uuid }
        nombre: { type: string }
        descripcion: { type: string }

    Prioridad:
      type: object
      properties:
        id: { type: string, format: uuid }
        nivel: { $ref: '#/components/schemas/NivelPrioridad' }
        descripcion: { type: string }

    Asignacion:
      type: object
      properties:
        id: { type: string, format: uuid }
        fechaRegistro: { type: string, format: date-time }
        responsable: { $ref: '#/components/schemas/Usuario' }

    HistorialSolicitud:
      type: object
      properties:
        id: { type: string, format: uuid }
        fechaHora: { type: string, format: date-time }
        accion: { type: string }
        observacion: { type: string }
        ejecutadoPor: { $ref: '#/components/schemas/Usuario' }

    CrearSolicitudRequest:
      type: object
      required: [descripcion, tipoSolicitudId, canalOrigen, solicitanteId]
      properties:
        descripcion: { type: string }
        tipoSolicitudId: { type: string, format: uuid }
        canalOrigen: { $ref: '#/components/schemas/CanalOrigen' }
        solicitanteId: { type: string, format: uuid }

    ClasificacionRequest:
      type: object
      required: [tipoSolicitudId, prioridadNivel, justificacionPrioridad]
      properties:
        tipoSolicitudId: { type: string, format: uuid }
        prioridadNivel: { $ref: '#/components/schemas/NivelPrioridad' }
        justificacionPrioridad: { type: string }

    CambioEstadoRequest:
      type: object
      required: [nuevoEstado, observacion]
      properties:
        nuevoEstado: { $ref: '#/components/schemas/EstadoSolicitud' }
        observacion: { type: string }

    AsignacionRequest:
      type: object
      required: [responsableId]
      properties:
        responsableId: { type: string, format: uuid }

    CierreRequest:
      type: object
      required: [observacionCierre]
      properties:
        observacionCierre: { type: string }

    SugerenciaIARequest:
      type: object
      properties:
        descripcion: { type: string }

    SugerenciaIAResponse:
      type: object
      properties:
        tipoSugerido: { type: string }
        prioridadSugerida: { $ref: '#/components/schemas/NivelPrioridad' }
        confianza: { type: number, format: float }

    PaginaSolicitudes:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Solicitud'
        totalElements: { type: integer }

    EstadoSolicitud:
      type: string
      enum: [REGISTRADA, CLASIFICADA, EN_ATENCION, ATENDIDA, CERRADA]

    NivelPrioridad:
      type: string
      enum: [BAJA, MEDIA, ALTA, CRITICA]

    CanalOrigen:
      type: string
      enum: [CSU, CORREO, TELEFONICO, SAC]

    Rol:
      type: string
      enum: [ESTUDIANTE, DOCENTE, ADMINISTRATIVO, COORDINADOR]

    SuccessResponse:
      type: object
      properties:
        message: { type: string }

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
        message: { type: string }