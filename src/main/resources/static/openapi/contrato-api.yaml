openapi: 3.0.0
info:
  title: Sistema de Gestión de Solicitudes Académicas
  version: 1.0.0
  description: API alineada con persistencia secuencial (Long IDs) y lógica de seguridad JWT.

security:
  - BearerAuth: []

paths:
  # --- AUTENTICACIÓN ---
  /auth/login:
    post:
      summary: Iniciar sesión
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  { type: string, example: "admin@coordinacion.triagre.com" }
                password: { type: string, example: "admin123" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }

  /auth/register:
    post:
      summary: Auto-registro institucional
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nombre, email, password]
              properties:
                nombre: { type: string }
                email:
                  {
                    type: string,
                    description: "Debe ser @estudiante.triagre.com, @docente.triagre.com, etc.",
                  }
                password: { type: string }
      responses:
        "201":
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # --- SOLICITUDES ---
  /solicitudes:
    post:
      summary: Crear solicitud (Simétrica a RF-01)
      tags: [Solicitudes]
      description: El autor (solicitante) se extrae automáticamente del Token JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrearSolicitudRequest"
      responses:
        "201":
          description: Solicitud registrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solicitud"

    get:
      summary: Listar solicitudes con filtros
      tags: [Solicitudes]
      parameters:
        - {
            name: estado,
            in: query,
            schema: { $ref: "#/components/schemas/EstadoSolicitud" },
          }
        - { name: tipoId, in: query, schema: { type: integer } }
        - {
            name: prioridad,
            in: query,
            schema: { $ref: "#/components/schemas/NivelPrioridad" },
          }
        - { name: responsableId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Página de resultados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginaSolicitudes"

  /solicitudes/{id}:
    get:
      summary: Detalle completo de una solicitud
      tags: [Solicitudes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solicitud"

  /solicitudes/{id}/clasificacion:
    put:
      summary: Clasificar y Priorizar (Solo COORDINADOR)
      tags: [Workflow]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClasificacionRequest"
      responses:
        "200":
          description: Clasificación exitosa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Solicitud"

  /solicitudes/{id}/asignacion:
    post:
      summary: Asignar a un responsable (Solo COORDINADOR)
      tags: [Workflow]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usuarioId: { type: integer }
      responses:
        "200":
          description: Asignación registrada exitosamente

  /solicitudes/{id}/atencion:
    put:
      summary: Marcar como Atendida (Solo COORDINADOR)
      tags: [Workflow]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comentariosAtencion: { type: string }
      responses:
        "200":
          description: Estado actualizado a ATENDIDA

  /solicitudes/{id}/cierre:
    post:
      summary: Cierre definitivo (Solo COORDINADOR)
      tags: [Workflow]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comentariosCierre: { type: string }
      responses:
        "200":
          description: Solicitud CERRADA

  /solicitudes/{id}/resumen:
    get:
      summary: Generar resumen inteligente del historial (IA)
      tags: [IA]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Resumen generado
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: string }

  # --- CATÁLOGOS ---
  /tipos-solicitud:
    get:
      summary: Listar catálogo de tipos
      tags: [Catálogos]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TipoSolicitud" }

  /prioridades:
    get:
      summary: Listar niveles de prioridad disponibles
      tags: [Catálogos]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { type: string, example: "ALTA" }

  /usuarios:
    get:
      summary: Listar personal disponible (Solo COORDINADOR)
      tags: [Catálogos]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Usuario" }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Solicitud:
      type: object
      properties:
        id: { type: integer }
        descripcion: { type: string }
        estado: { $ref: "#/components/schemas/EstadoSolicitud" }
        canalOrigen: { $ref: "#/components/schemas/CanalOrigen" }
        tipoSolicitudId: { type: integer }
        prioridad: { $ref: "#/components/schemas/NivelPrioridad" }
        justificacionPrioridad: { type: string }
        usuarioAsignadoId: { type: integer }
        solicitanteId: { type: integer }
        fechaCreacion: { type: string, format: date-time }

    Usuario:
      type: object
      properties:
        id: { type: integer }
        nombre: { type: string }
        email: { type: string }
        rol: { $ref: "#/components/schemas/Rol" }

    TipoSolicitud:
      type: object
      properties:
        id: { type: integer }
        nombre: { type: string }
        descripcion: { type: string }

    CrearSolicitudRequest:
      type: object
      required: [descripcion, canalOrigen]
      properties:
        descripcion: { type: string }
        canalOrigen: { $ref: "#/components/schemas/CanalOrigen" }

    ClasificacionRequest:
      type: object
      required: [tipoSolicitudId, prioridad, justificacionPrioridad]
      properties:
        tipoSolicitudId: { type: integer }
        prioridad: { $ref: "#/components/schemas/NivelPrioridad" }
        justificacionPrioridad: { type: string }

    EstadoSolicitud:
      type: string
      enum: [REGISTRADA, CLASIFICADA, EN_ATENCION, ATENDIDA, CERRADA]

    NivelPrioridad:
      type: string
      enum: [BAJA, MEDIA, ALTA, CRITICA]

    CanalOrigen:
      type: string
      enum: [CSU, CORREO, TELEFONICO, SAC]

    Rol:
      type: string
      enum: [ESTUDIANTE, DOCENTE, ADMINISTRATIVO, COORDINADOR]

    SuccessResponse:
      type: object
      properties:
        message: { type: string }
        data: { type: object }

    PaginaSolicitudes:
      type: object
      properties:
        content:
          type: array
          items: { $ref: "#/components/schemas/Solicitud" }
        totalPages: { type: integer }
        totalElements: { type: integer }
